{% extends "base.html" %}

{% block title %}Resume Builder - Career Assistant{% endblock %}

{% block content %}
<div class="card" style="margin: 2rem auto; max-width: 800px;">
    <h2>Resume Builder</h2>
    <p>Generate a tailored resume for a specific job description.</p>
    <!-- Basic placeholder for builder UI -->
    <div style="margin-top: 1.5rem;">
        <label>Job Description:</label>
        <textarea style="width: 100%; height: 150px; margin-top: 0.5rem;"></textarea>
        <button class="btn btn-primary" style="margin-top: 1rem;">Generate Resume</button>
    </div>
</div>
{% endblock %}
