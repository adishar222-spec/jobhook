{% extends "base.html" %}

{% block title %}Courses — JobHook{% endblock %}

{% block extra_css %}
<style>
    .page-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
        gap: 1rem;
    }

    .page-header h1 {
        margin-bottom: 0.2rem;
    }

    .page-header p {
        color: var(--text-muted);
        font-size: 0.9rem;
    }

    /* ── Toolbar ─────────────────────────────────────────────── */
    .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: center;
        margin-bottom: 1.25rem;
    }

    .toolbar input[type="text"] {
        flex: 1;
        min-width: 220px;
        max-width: 360px;
        padding: 0.65rem 1rem;
    }

    .platform-pills {
        display: flex;
        gap: 0.4rem;
        flex-wrap: wrap;
    }

    .pill {
        padding: 0.35rem 0.85rem;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text-muted);
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
    }

    .pill:hover {
        border-color: rgba(139, 92, 246, 0.5);
        color: var(--text-main);
    }

    .pill.active {
        background: rgba(139, 92, 246, 0.18);
        border-color: rgba(139, 92, 246, 0.6);
        color: #c4b5fd;
    }

    /* ── Banner ──────────────────────────────────────────────── */
    #scrape-banner {
        display: none;
        align-items: center;
        gap: 0.75rem;
        padding: 0.85rem 1.25rem;
        border-radius: var(--radius-lg);
        background: rgba(139, 92, 246, 0.1);
        border: 1px solid rgba(139, 92, 246, 0.3);
        margin-bottom: 1.25rem;
        font-size: 0.88rem;
        color: #c4b5fd;
    }

    #scrape-banner.active {
        display: flex;
    }

    .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(139, 92, 246, 0.3);
        border-top-color: #a78bfa;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        flex-shrink: 0;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    /* ── Cards ───────────────────────────────────────────────── */
    #courses-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 1.25rem;
    }

    .course-card {
        background: var(--surface);
        backdrop-filter: var(--glass-blur);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.4rem;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
    }

    .course-card:hover {
        border-color: rgba(139, 92, 246, 0.5);
        transform: translateY(-3px);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.22);
    }

    .card-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 0.5rem;
    }

    .card-title {
        font-size: 1rem;
        font-weight: 700;
        color: var(--text-main);
    }

    .card-provider {
        font-size: 0.83rem;
        color: var(--text-muted);
        font-weight: 500;
        margin-top: 0.15rem;
    }

    .platform-badge {
        flex-shrink: 0;
        font-size: 0.7rem;
        font-weight: 700;
        padding: 0.18rem 0.55rem;
        border-radius: 4px;
        text-transform: uppercase;
        letter-spacing: 0.03em;
    }

    .badge-edx {
        background: rgba(16, 185, 129, 0.15);
        color: #10b981;
    }

    .badge-youtube {
        background: rgba(239, 68, 68, 0.15);
        color: #ef4444;
    }


    .badge-default {
        background: rgba(139, 92, 246, 0.15);
        color: #c4b5fd;
    }

    .course-img {
        width: 100%;
        height: 140px;
        object-fit: cover;
        border-radius: var(--radius);
        background: var(--darker);
    }

    .course-desc {
        font-size: 0.83rem;
        color: var(--text-muted);
        line-height: 1.55;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
        flex: 1;
    }

    .card-actions {
        display: flex;
        gap: 0.5rem;
        margin-top: auto;
    }

    .card-actions .btn {
        flex: 1;
        padding: 0.5rem;
        font-size: 0.83rem;
        text-align: center;
        text-decoration: none;
    }

    .loading-skeleton {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        animation: pulse 1.5s ease infinite;
    }

    @keyframes pulse {

        0%,
        100% {
            opacity: 1
        }

        50% {
            opacity: 0.35
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Course Search</h1>
        <p>Find courses from edX and YouTube playlists.</p>
    </div>
    <button id="scrape-btn" class="btn btn-primary">🌐 Find Courses</button>
</div>

<div id="scrape-banner">
    <div class="spinner"></div>
    <span id="scrape-banner-text">Fetching courses… Chrome may open for edX.</span>
</div>

<div class="toolbar">
    <input type="text" id="course-search" placeholder="🔍  e.g. Machine Learning, Python, Data Science…" />
    <button id="search-btn" class="btn btn-outline">Search Saved</button>

    <div class="platform-pills" id="platform-pills">
        <button class="pill active" data-platform="all">All</button>
        <button class="pill" data-platform="edx">🟢 edX</button>
        <button class="pill" data-platform="youtube">🔴 YouTube</button>

    </div>
</div>

<div id="courses-grid">
    <div class="loading-skeleton" style="height:200px;"></div>
    <div class="loading-skeleton" style="height:200px;"></div>
    <div class="loading-skeleton" style="height:200px;"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    requireAuth();

    let activePlatform = "all";

    const BADGE = {
        edx: { cls: "badge-edx", label: "edX" },
        youtube: { cls: "badge-youtube", label: "YouTube" },
    };

    function platformBadge(platform) {
        const b = BADGE[platform] || { cls: "badge-default", label: platform || "Course" };
        return `<span class="platform-badge ${b.cls}">${b.label}</span>`;
    }

    function showSkeletons() {
        document.getElementById("courses-grid").innerHTML = `
        <div class="loading-skeleton" style="height:200px;"></div>
        <div class="loading-skeleton" style="height:200px;"></div>
        <div class="loading-skeleton" style="height:200px;"></div>`;
    }

    function renderCards(courses) {
        const grid = document.getElementById("courses-grid");
        if (!courses || !courses.length) {
            grid.innerHTML = `
        <div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-muted);">
            <div style="font-size:3rem;margin-bottom:1rem;">🔍</div>
            <p>No courses found. Try a different keyword and click <strong>Find Courses</strong>.</p>
        </div>`;
            return;
        }
        grid.innerHTML = "";
        courses.forEach(c => {
            const title = c.title || c.name || "Untitled";
            const provider = c.provider || c.company || "";
            const desc = c.description || "";
            const link = c.link || "#";
            const platform = c.platform || "default";
            const thumb = c.thumbnail || null;

            const card = document.createElement("div");
            card.className = "course-card";
            card.innerHTML = `
        <div class="card-top">
            <div>
                <div class="card-title">${title}</div>
                <div class="card-provider">${provider}</div>
            </div>
            ${platformBadge(platform)}
        </div>
        ${thumb ? `<img src="${thumb}" class="course-img" alt="thumbnail" loading="lazy" />` : ""}
        ${desc ? `<p class="course-desc">${desc}</p>` : ""}
        <div class="card-actions">
            <button class="btn btn-primary" onclick="saveCourse('${c._id}', this)">🔖 Save</button>
            <a href="${link}" target="_blank" rel="noopener" class="btn btn-ghost">View ↗</a>
        </div>`;
            grid.appendChild(card);
        });
    }

    // ── Search saved DB ────────────────────────────────────────────────────────────
    async function loadCourses(query = "") {
        showSkeletons();
        try {
            const params = new URLSearchParams({ q: query, platform: activePlatform, limit: 30 });
            const res = await API.get(`/courses/search?${params}`);
            if (!res || !res.ok) throw new Error();
            renderCards(await res.json());
        } catch {
            document.getElementById("courses-grid").innerHTML =
                `<p style="color:var(--danger);grid-column:1/-1;">Error loading courses.</p>`;
        }
    }

    // ── Live Scrape ────────────────────────────────────────────────────────────────
    function showBanner(t) {
        document.getElementById("scrape-banner-text").textContent = t;
        document.getElementById("scrape-banner").classList.add("active");
    }
    function hideBanner() { document.getElementById("scrape-banner").classList.remove("active"); }

    async function triggerScrape() {
        const keyword = document.getElementById("course-search").value.trim();
        if (!keyword) { showToast("Enter a keyword first.", "info"); return; }

        const btn = document.getElementById("scrape-btn");
        btn.disabled = true; btn.textContent = "⏳ Fetching…";

        const pills = [...document.querySelectorAll(".pill.active[data-platform]")]
            .map(p => p.dataset.platform)
            .filter(p => p !== "all");
        const platforms = pills.length ? pills : ["edx", "youtube"];

        showBanner("Fetching courses — Chrome may open briefly for edX…");
        try {
            const res = await API.post("/courses/scrape", { keyword, platforms });
            const data = await res.json();
            hideBanner();
            if (data.courses && data.courses.length) {
                renderCards(data.courses);
                showToast(`✅ ${data.count} courses fetched!`);
            } else {
                showToast("No courses found for this keyword.", "info");
                loadCourses(keyword);
            }
        } catch {
            hideBanner();
            showToast("Scrape failed — see console.", "error");
        } finally {
            btn.disabled = false; btn.textContent = "🌐 Find Courses";
        }
    }

    // ── Save ───────────────────────────────────────────────────────────────────────
    async function saveCourse(id, btn) {
        if (!id || id === "undefined") { showToast("Cannot save — no ID.", "error"); return; }
        btn.disabled = true; btn.textContent = "Saving…";
        try {
            const res = await API.post("/courses/save", { course_id: id });
            if (res && res.ok) { showToast("Course saved! 🎉"); btn.textContent = "✅ Saved"; }
            else { throw new Error(); }
        } catch {
            showToast("Error saving.", "error");
            btn.disabled = false; btn.textContent = "🔖 Save";
        }
    }

    // ── Init ───────────────────────────────────────────────────────────────────────
    document.addEventListener("DOMContentLoaded", () => {
        loadCourses();

        document.getElementById("search-btn").addEventListener("click", () =>
            loadCourses(document.getElementById("course-search").value));
        document.getElementById("course-search").addEventListener("keydown", e => {
            if (e.key === "Enter") loadCourses(e.target.value);
        });
        document.getElementById("scrape-btn").addEventListener("click", triggerScrape);

        document.querySelectorAll(".pill[data-platform]").forEach(pill => {
            pill.addEventListener("click", () => {
                document.querySelectorAll(".pill[data-platform]").forEach(p => p.classList.remove("active"));
                pill.classList.add("active");
                activePlatform = pill.dataset.platform;
                loadCourses(document.getElementById("course-search").value);
            });
        });
    });
</script>
{% endblock %}
