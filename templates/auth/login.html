{% extends "base.html" %}

{% block title %}Login — CareerAI{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}" />
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-brand">
            <span class="brand-icon">🎯</span>
            <h1>CareerAI</h1>
            <p>Sign in to your account</p>
        </div>

        <div class="auth-error" id="auth-error"></div>

        <form id="login-form">
            <div class="auth-form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
            </div>
            <div class="auth-form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Your password" required autocomplete="current-password" />
            </div>
            <button type="submit" class="auth-submit-btn" id="login-btn">Sign In</button>
        </form>

        <p class="auth-footer">
            Don't have an account? <a href="/auth/register">Create one →</a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const btn = document.getElementById("login-btn");
    const errorEl = document.getElementById("auth-error");

    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span> Signing in...`;
    errorEl.classList.remove("visible");

    try {
        const res = await API.post("/auth/login", { email, password });
        if (res && res.ok) {
            const data = await res.json();
            localStorage.setItem("access_token", data.access_token);
            localStorage.setItem("refresh_token", data.refresh_token);
            localStorage.setItem("user_name", data.user?.name || "");
            window.location.href = "/dashboard";
        } else {
            const data = await res.json();
            errorEl.textContent = data.error || "Invalid email or password.";
            errorEl.classList.add("visible");
        }
    } catch (err) {
        errorEl.textContent = "Connection error. Please try again.";
        errorEl.classList.add("visible");
    } finally {
        btn.disabled = false;
        btn.innerHTML = "Sign In";
    }
});
</script>
{% endblock %}
